name: Lint & Format Check

on:
  pull_request_target:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Run Format Check
        run: npm run format:check

      - name: Run Lint Check
        run: npm run lint

      - name: Run Type Check
        run: npm run type-check
